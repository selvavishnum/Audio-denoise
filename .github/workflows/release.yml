name: Release APK

# Trigger 1 — manual dispatch from the Actions tab (choose version)
# Trigger 2 — pushing a tag like  v1.2.3
on:
  workflow_dispatch:
    inputs:
      version_name:
        description: 'Version name  (e.g. 1.2.0)'
        required: true
        default: '1.0.0'
      version_code:
        description: 'Version code  (integer, must be higher than last Play Store upload)'
        required: true
        default: '1'
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    name: Build & Publish Release APK
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      # ── Checkout ──────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── Java ──────────────────────────────────────────────────────────
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      # ── Flutter ───────────────────────────────────────────────────────
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      # ── Dependencies ──────────────────────────────────────────────────
      - name: Install dependencies
        run: flutter pub get

      # ── Resolve version ───────────────────────────────────────────────
      - name: Resolve version
        id: ver
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            NAME="${GITHUB_REF#refs/tags/v}"
            CODE=$(git rev-list --count HEAD)
          else
            NAME="${{ github.event.inputs.version_name }}"
            CODE="${{ github.event.inputs.version_code }}"
          fi
          echo "name=$NAME"  >> "$GITHUB_OUTPUT"
          echo "code=$CODE"  >> "$GITHUB_OUTPUT"
          echo "tag=v$NAME"  >> "$GITHUB_OUTPUT"

      # ── Production signing (optional) ─────────────────────────────────
      # Store these four secrets in  Settings → Secrets → Actions:
      #   KEYSTORE_BASE64  — base64 of your .jks file
      #                       $ base64 -w0 upload-keystore.jks
      #   STORE_PASSWORD   — keystore password
      #   KEY_ALIAS        — key alias inside the keystore
      #   KEY_PASSWORD     — key password
      #
      # If secrets are absent the APK is signed with the debug key (fine
      # for sideloading and internal testing, NOT for Play Store).
      - name: Set up production signing
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          STORE_PASSWORD:  ${{ secrets.STORE_PASSWORD }}
          KEY_ALIAS:       ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD:    ${{ secrets.KEY_PASSWORD }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 --decode > android/keystore.jks
            cat > android/key.properties <<EOF
          storeFile=../keystore.jks
          storePassword=$STORE_PASSWORD
          keyAlias=$KEY_ALIAS
          keyPassword=$KEY_PASSWORD
          EOF
            echo "Production signing configured."
          else
            echo "No KEYSTORE_BASE64 secret — APK will use debug signing."
          fi

      # ── Build ─────────────────────────────────────────────────────────
      - name: Build release APK
        run: |
          flutter build apk --release \
            --build-name="${{ steps.ver.outputs.name }}" \
            --build-number="${{ steps.ver.outputs.code }}" \
            --dart-define="ADMIN_EMAIL=${{ secrets.ADMIN_EMAIL || 'selvavishnu.m@gmail.com' }}"

      # ── Rename APK ────────────────────────────────────────────────────
      - name: Rename APK
        run: |
          mv build/app/outputs/flutter-apk/app-release.apk \
             build/app/outputs/flutter-apk/NoiseClear-${{ steps.ver.outputs.name }}.apk

      # ── Upload artifact (always available in Actions tab) ─────────────
      - name: Upload release APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: NoiseClear-${{ steps.ver.outputs.name }}-apk
          path: build/app/outputs/flutter-apk/NoiseClear-*.apk
          retention-days: 90

      # ── Build AAB (Android App Bundle) — THIS is what Play Store needs ─
      # Google Play only accepts .aab uploads. It is signed with the same
      # upload key (key.properties → signingConfigs.release). If the signing
      # secrets are absent it is debug-signed and Play Console will REJECT it,
      # so the four secrets above are mandatory for a real Play Store upload.
      - name: Build release AAB
        run: |
          flutter build appbundle --release \
            --build-name="${{ steps.ver.outputs.name }}" \
            --build-number="${{ steps.ver.outputs.code }}" \
            --dart-define="ADMIN_EMAIL=${{ secrets.ADMIN_EMAIL || 'selvavishnu.m@gmail.com' }}"

      # ── Rename AAB ────────────────────────────────────────────────────
      - name: Rename AAB
        run: |
          mv build/app/outputs/bundle/release/app-release.aab \
             build/app/outputs/bundle/release/NoiseClear-${{ steps.ver.outputs.name }}.aab

      # ── Upload AAB artifact (download this, upload to Play Console) ────
      - name: Upload release AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: NoiseClear-${{ steps.ver.outputs.name }}-aab
          path: build/app/outputs/bundle/release/NoiseClear-*.aab
          retention-days: 90

      # ── Deobfuscation (mapping) file — fixes Play Console's warning ────
      # minifyEnabled true (R8) already produces this at build time; it just
      # was never captured anywhere. Rename + upload it so it can be attached
      # in Play Console: App bundle explorer -> select this version ->
      # Downloads tab -> "Upload deobfuscation file". Optional but recommended
      # so crashes/ANRs show real symbol names instead of a1.b2.c3.
      - name: Rename R8 mapping file
        run: |
          cp build/app/outputs/mapping/release/mapping.txt \
             build/app/outputs/mapping/release/NoiseClear-${{ steps.ver.outputs.name }}-mapping.txt

      - name: Upload mapping file artifact
        uses: actions/upload-artifact@v4
        with:
          name: NoiseClear-${{ steps.ver.outputs.name }}-mapping
          path: build/app/outputs/mapping/release/NoiseClear-*-mapping.txt
          retention-days: 90

      # ── GitHub Release (on tag push OR manual dispatch) ───────────────
      # On manual dispatch the tag does not yet exist; action-gh-release
      # creates it at the checked-out commit (target_commitish).
      - name: Create GitHub Release
        if: ${{ startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name:         ${{ steps.ver.outputs.tag }}
          target_commitish: ${{ github.sha }}
          name:             "NoiseClear ${{ steps.ver.outputs.tag }}"
          body: |
            ## NoiseClear ${{ steps.ver.outputs.tag }}

            ### Play Store (recommended)
            Upload **NoiseClear-${{ steps.ver.outputs.name }}.aab** to
            Play Console → your app → Production (or Internal testing) →
            Create new release → upload the `.aab`. Google Play re-signs it
            with App Signing. Version code: **${{ steps.ver.outputs.code }}**
            (must be higher than the previous upload).

            After uploading, clear the "no deobfuscation file" warning:
            App bundle explorer → select this version → Downloads tab →
            Upload deobfuscation file → pick **NoiseClear-${{ steps.ver.outputs.name }}-mapping.txt**
            below. Optional, but makes crash/ANR reports readable.

            ### Sideload / direct install (testing)
            1. Download **NoiseClear-${{ steps.ver.outputs.name }}.apk** below.
            2. On your Android device: **Settings → Apps → Install unknown apps** → allow your browser/file manager.
            3. Open the downloaded APK and tap **Install**.

            Requires Android 7.0+ (minSdk 24).

            ---
            *Full changelog generated from commits since the last release.*
          generate_release_notes: true
          files: |
            build/app/outputs/flutter-apk/NoiseClear-*.apk
            build/app/outputs/bundle/release/NoiseClear-*.aab
            build/app/outputs/mapping/release/NoiseClear-*-mapping.txt
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
