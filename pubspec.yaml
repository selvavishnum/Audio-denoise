name: noiseclear
description: NoiseClear - Professional-grade audio noise cancellation & voice transformation
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.12.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Audio recording & playback
  record: ^7.0.0
  just_audio: ^0.9.38

  # File import & sharing
  file_picker: ^8.0.3
  path_provider: ^2.1.3
  share_plus: ^12.0.2

  # State management
  provider: ^6.1.2

  # UI
  google_fonts: ^6.2.0
  flutter_animate: ^4.5.0

  # Permissions
  permission_handler: ^11.3.1

  # Utils
  uuid: ^4.4.0

  # Video denoise
  image_picker: ^1.1.2
  video_player: ^2.9.2

  # Auth & Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  google_sign_in: ^6.2.1
  firebase_analytics: ^11.3.3

  # Monetization
  purchases_flutter: ^8.0.0

  # Ads
  google_mobile_ads: ^5.1.0

  # Persistence (preset save, usage counter)
  shared_preferences: ^2.3.5

  # Neural denoising: DeepFilterNet2 runs via ONNX Runtime (native Android).
  # TFLite removed — incompatible with Flutter 3.44.x Dart SDK.

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/models/
    - assets/demo/
    - assets/legal/
