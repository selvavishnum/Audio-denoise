name: noiseclear
description: NoiseClear - Professional-grade audio noise cancellation & voice transformation
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.12.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Audio recording & playback
  record: ^7.0.0
  just_audio: ^0.9.38

  # File import & sharing
  file_picker: ^8.0.3
  path_provider: ^2.1.3
  share_plus: ^12.0.2

  # State management
  provider: ^6.1.2

  # UI
  google_fonts: ^6.2.0
  flutter_animate: ^4.5.0

  # Permissions
  permission_handler: ^11.3.1

  # Utils
  uuid: ^4.4.0

  # Multi-format audio import (MP3, M4A, FLAC, OGG → WAV)
  ffmpeg_kit_flutter_audio: ^6.0.3

  # Persistence (preset save, usage counter)
  shared_preferences: ^2.3.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
