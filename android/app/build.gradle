plugins {
    id "com.android.application"
    id "dev.flutter.flutter-gradle-plugin"
}

apply plugin: 'com.google.gms.google-services'

def localProperties = new Properties()
def localPropertiesFile = rootProject.file('local.properties')
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader('UTF-8') { reader ->
        localProperties.load(reader)
    }
}

// Production signing — android/key.properties is NOT committed to git.
// In CI, the release workflow decodes the keystore from a GitHub Secret and
// writes key.properties before the build step.
def keystorePropertiesFile = rootProject.file('key.properties')
def keystoreProperties = new Properties()
if (keystorePropertiesFile.exists()) {
    keystorePropertiesFile.withInputStream { keystoreProperties.load(it) }
}

def flutterVersionCode = localProperties.getProperty('flutter.versionCode') ?: '1'
def flutterVersionName = localProperties.getProperty('flutter.versionName') ?: '1.0'

android {
    namespace 'com.noiseclear.app'
    compileSdk 36
    ndkVersion "28.2.13676358"

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }

    kotlinOptions {
        jvmTarget = '1.8'
    }

    sourceSets {
        main.java.srcDirs += 'src/main/kotlin'
    }

    defaultConfig {
        applicationId 'com.noiseclear.app'
        minSdk 24
        targetSdk 35
        versionCode flutterVersionCode.toInteger()
        versionName flutterVersionName
        multiDexEnabled true

        ndk {
            abiFilters 'armeabi-v7a', 'arm64-v8a', 'x86_64'
        }
    }

    packagingOptions {
        // Prevent duplicate TFLite native library conflicts
        pickFirst 'lib/armeabi-v7a/libtensorflowlite_jni.so'
        pickFirst 'lib/arm64-v8a/libtensorflowlite_jni.so'
        pickFirst 'lib/x86_64/libtensorflowlite_jni.so'

        // sherpa_onnx (neural TTS) and onnxruntime-android (DeepFilter) each
        // bundle their own libonnxruntime.so / libc++_shared.so. The native-lib
        // merge runs over every ABI in the AARs (incl. x86) before abiFilters
        // apply, so use a glob to keep the first copy for ALL ABIs. The neural
        // TTS path links against sherpa's matching lib; DeepFilter's ONNX path
        // is inactive until model weights are bundled in assets/models/.
        pickFirst '**/libonnxruntime.so'
        pickFirst '**/libc++_shared.so'
    }

    signingConfigs {
        if (keystorePropertiesFile.exists()) {
            release {
                storeFile     file(keystoreProperties['storeFile'])
                storePassword keystoreProperties['storePassword']
                keyAlias      keystoreProperties['keyAlias']
                keyPassword   keystoreProperties['keyPassword']
            }
        }
    }

    buildTypes {
        release {
            // Uses production signing when key.properties is present (CI release
            // workflow), otherwise falls back to debug signing (debug/local builds).
            signingConfig keystorePropertiesFile.exists()
                          ? signingConfigs.release
                          : signingConfigs.debug
            minifyEnabled true
            shrinkResources true
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }


}

flutter {
    source '../..'
}

dependencies {
    implementation 'androidx.multidex:multidex:2.0.1'
    implementation 'com.microsoft.onnxruntime:onnxruntime-android:1.18.0'
}
